name: Build CV PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure citations.bib exists
        run: touch citations.bib

      - name: Compile cv.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex

      - name: Rename PDF for download
        run: mv cv.pdf "Resume - Muhammad Saad Ashraf.pdf"

      - name: Replace "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag --repo "${{ github.repository }}" || true
          gh release create latest \
            --repo "${{ github.repository }}" \
            --title "Latest CV" \
            --notes "Auto-built from ${{ github.sha }}." \
            --latest \
            "Resume - Muhammad Saad Ashraf.pdf"
