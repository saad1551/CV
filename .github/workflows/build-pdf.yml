name: Build CV PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure citations.bib exists
        run: touch citations.bib

      - name: Compile cv.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex

      - name: Publish PDF to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CV
          body: Auto-built from commit ${{ github.sha }}.
          files: cv.pdf
          make_latest: "true"
